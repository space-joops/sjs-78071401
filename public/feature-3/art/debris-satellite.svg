<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="우주쓰레기 5등급 — 폐위성">
  <!-- 5등급: 수명이 다한 폐위성 (한쪽 날개 파손) -->
  <g stroke="#14204A" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- 왼쪽 태양전지 날개 -->
    <rect x="6" y="48" width="30" height="20" rx="6" fill="#7CC8FF"/>
    <!-- 부러진 오른쪽 날개 + 떠다니는 조각 -->
    <path d="M80 50 L94 47 L92 57 L86 55 L89 66 L80 64 Z" fill="#7CC8FF"/>
    <rect x="100" y="42" width="13" height="11" rx="4" fill="#7CC8FF" transform="rotate(22 106 47)"/>
    <!-- 본체 -->
    <rect x="42" y="40" width="38" height="34" rx="9" fill="#CBD8F0"/>
    <!-- 구부러진 안테나 -->
    <path d="M60 40 L57 26 L70 20" fill="none"/>
  </g>
  <circle cx="73" cy="18" r="4.5" fill="#FF8FA3" stroke="#14204A" stroke-width="4.5"/>
  <!-- 날개 셀 라인 -->
  <path d="M21 50 L21 66" stroke="#14204A" stroke-width="4" stroke-linecap="round"/>
  <!-- 고장난 X자 눈 -->
  <g stroke="#14204A" stroke-width="4.5" stroke-linecap="round">
    <path d="M51 52 L58 59 M58 52 L51 59"/>
    <path d="M64 52 L71 59 M71 52 L64 59"/>
  </g>
  <!-- 꺼진 신호등 + 균열 -->
  <circle cx="70" cy="67" r="3.5" fill="#FF8FA3"/>
  <path d="M46 66 L51 70" stroke="#14204A" stroke-width="4" stroke-linecap="round"/>
  <!-- 반짝임 -->
  <path d="M24 88 L26.5 93.5 L32 96 L26.5 98.5 L24 104 L21.5 98.5 L16 96 L21.5 93.5 Z" fill="#FFD977"/>
  <circle cx="94" cy="86" r="3" fill="#3DF5C9"/>
</svg>
